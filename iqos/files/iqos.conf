# ------------------------------
# 全局配置
# ------------------------------
config global 'global'
    option enabled '0'                     # 总开关: 1=启用QoS, 0=禁用
    option wan_interface 'pppoe-wan'       # WAN接口名称（通常为pppoe-wan或eth1）
    option algorithm 'htb_cake'            # 队列算法: htb_cake / hfsc_cake / cake / htb_fqcodel
    option linklayer 'atm'                 # 链路层类型: atm / docsis / ethernet / raw
    option overhead '32'                   # 链路层开销（字节），ATM常用44，以太网常用40
    option auto_adjust_percentages '1'     # 是否自动调整类别百分比（0/1）
    option ruleset 'default.ru'            # 规则集文件名（位于/etc/iqos/rulesets/）
    option save_nft_rules '1'              # 是否保存nft规则到文件（用于调试）
    option enable_ack_limit '0'            # ACK限速总开关
    option enable_tcp_upgrade '0'          # TCP升级（慢连接提速）总开关
    option enable_udp_limit '0'            # UDP限速总开关
    option enable_dclassify '1'            # 动态分类总开关（自动识别大流量/高吞吐）
    option dclassify_prio 'last'           # 动态分类规则在链中的位置: first(链首) / last(链尾)

# ------------------------------
# 上传方向总带宽
# ------------------------------
config upload 'upload'
    option total_bandwidth '45000'         # 上传总带宽（kbit/s），此处50Mbps
    option default_class 'uclass_3'        # 默认类别（normal，即普通流量）

# ------------------------------
# 下载方向总带宽
# ------------------------------
config download 'download'
    option default_class 'dclass_3'        # 默认类别（normal）
    option total_bandwidth '180000'        # 下载总带宽（kbit/s），此处100Mbps
    option ifb_device 'ifb0'               # 入口重定向使用的IFB设备名

# ------------------------------
# HFSC 算法参数（用于hfsc/hybrid模式）
# ------------------------------
config hfsc 'hfsc'
    option latency_mode 'dynamic'          # 延迟模式: dynamic / fixed
    option minrtt_enabled '1'              # 是否启用最小RTT优化
    option minrtt_delay '1000us'           # 最小RTT延迟值

# ------------------------------
# CAKE 队列参数
# ------------------------------
config cake 'cake'
    option enable_mq '1'                   # 是否启用多队列CAKE-MQ（需要硬件支持）
    option diffserv_mode 'diffserv4'       # DiffServ模式: besteffort / diffserv3/4/5/8
    option rtt '50ms'                      # 预期RTT（用于流量整形）
    option flowmode 'srchost'              # 流模式: srchost / dsthost / flows / dual-srchost
    option overhead '0'                    # 额外开销（字节）
    option mpu '0'                         # 最小包单元（字节）
    option memlimit '64Mb'                 # 内存限制（自动或固定值）
    option ack_filter '1'                  # ACK过滤（0/1）
    option nat '1'                         # NAT穿透优化
    option wash '0'                        # 是否清洗DSCP标记
    option split_gso '0'                   # 拆分GSO大包
    option ingress '0'                     # 入口模式: 0=使用IFB, 1=使用ingress队列
    option autorate_ingress '0'            # 自动调整入口速率
    option ecn '1'                         # 启用ECN（显式拥塞通知）
	option enable_virtual_mq '0'           # 0=禁用(默认)，1=启用虚拟接口多队列探测

# ------------------------------
# FQ_CODEL 队列参数（用于htb_fqcodel模式）
# ------------------------------
config fq_codel 'fq_codel'
    option target '5000'                   # 目标延迟（微秒）
    option limit '10240'                   # 队列最大包数
    option quantum '1514'                  # 量子（字节）
    option flows '1024'                    # 流数量
    option interval '100000'               # 间隔（微秒）
    option memory_limit 'auto'             # 内存限制: auto / 具体大小（如16M）
    option ce_threshold '0'                # CE阈值（毫秒）
    option ecn '1'                         # ECN开关

# ------------------------------
# HTB 算法参数
# ------------------------------
config htb 'htb'
    option priomap_enabled '1'             # 是否启用priomap（DSCP映射）
    option drr_quantum 'auto'              # DRR量子（字节），auto为自动
    option r2q '20'                        # 速率转量子系数（默认20）

# ------------------------------
# 主动拥塞控制（qosacc，默认禁用）
# ------------------------------
config qosacc 'qosacc'
    option enabled '0'                     # 总开关
    option use_ipv6 '0'                    # 是否使用IPv6
    option ping_interval '800'             # Ping间隔（毫秒）
    option enable_active_minrtt '1'        # 启用主动/最小RTT切换
    option skip_initial_measurement '0'    # 跳过初始测量
    option initial_ping_time '30'          # 初始Ping时间（秒）
    option initial_link_limit '90000'      # 初始链路限制（kbit/s）
    option verbose '0'                     # 详细输出
    option min_bandwidth_ratio '15'        # 最小带宽比例（%）
    option max_bandwidth_ratio '95'        # 最大带宽比例（%）
    option min_bw_change '50'              # 最小带宽变化（kbit/s）
    option control_interval '2000'         # 控制间隔（毫秒）

# ------------------------------
# 智能分类器（idclass）参数
# ------------------------------
config idclass 'idclass'
    # 总开关
    option enabled '1'

    # ---------- 实时类（游戏/VoIP）阈值 ----------
    option game_max_avg_pktlen '200'       # 最大平均包长（字节）
    option game_min_conn '1'               # 最小连接数
    option game_max_conn '10'              # 最大并发连接数
    option game_max_pps '20'               # 最大每秒包数
    option game_sample_packets '10'        # 采样包数

    # ---------- 视频类阈值 ----------
    option video_min_avg_pktlen '800'      # 最小平均包长
    option video_max_avg_pktlen '1500'     # 最大平均包长
    option video_min_conn '1'              # 最小连接数
    option video_max_conn '30'             # 最大连接数
    option video_min_pps '50'              # 最小PPS
    option video_max_pps '200'             # 最大PPS

    # ---------- 大流量类阈值 ----------
    option bulk_min_avg_pktlen '1000'      # 最小平均包长
    option bulk_min_conn '20'              # 最小连接数
    option bulk_min_pps '100'              # 最小PPS

    # ---------- TCP标志分布阈值 ----------
    option tcp_flags_syn_ack_ratio '2'     # SYN/ACK比例
    option tcp_flags_window '10'           # 统计窗口包数

    # ---------- 连接持续时间阈值 ----------
    option conn_duration_short '5'         # 短连接阈值（秒）
    option conn_duration_long '30'         # 长连接阈值（秒）

    # ---------- 上下行流量比阈值 ----------
    option up_down_ratio_low '0.3'         # 下行主导阈值
    option up_down_ratio_high '3.0'        # 上行主导阈值

    # ---------- 突发检测阈值 ----------
    option burst_window_ms '100'           # 突发时间窗口（毫秒）
    option burst_packets '10'              # 窗口内最大包数
    option burst_bytes '10240'             # 窗口内最大字节数

    # ---------- 包间间隔阈值 ----------
    option iat_threshold_us '10000'        # IAT阈值（微秒）

    # ---------- 重传阈值 ----------
    option retrans_threshold '5'           # 重传率百分比

    # ---------- 类别ID映射 ----------
    option class_realtime '1'              # 实时类ID（对应uclass_1/dclass_1）
    option class_video '2'                 # 视频类ID（对应uclass_2/dclass_2）
    option class_normal '3'                # 普通类ID（对应uclass_3/dclass_3）
    option class_bulk '4'                  # 大流量类ID（对应uclass_4/dclass_4）

    # ---------- 特征开关 ----------
    option enable_pktlen '1'               # 包长检测
    option enable_conn_count '1'           # 连接数检测
    option enable_pps '0'                  # PPS检测
    option enable_iat '0'                  # 包间间隔检测
    option enable_retrans '0'              # 重传检测
    option enable_tcp_flags '0'            # TCP标志检测
    option enable_conn_duration '0'        # 连接持续时间检测
    option enable_up_down_ratio '0'        # 上下行比例检测
    option enable_burst '0'                # 突发检测

    # ---------- 权重配置 ----------
    option weight_pktlen_realtime '3'      # 实时类包长权重
    option weight_pktlen_video '3'         # 视频类包长权重
    option weight_pktlen_normal '1'        # 普通类包长权重
    option weight_pktlen_bulk '3'          # 大流量类包长权重
    option weight_conn_realtime '2'        # 实时类连接数权重
    option weight_conn_video '1'           # 视频类连接数权重
    option weight_conn_normal '1'          # 普通类连接数权重
    option weight_conn_bulk '2'            # 大流量类连接数权重
    option weight_pps_realtime '2'         # 实时类PPS权重
    option weight_pps_video '2'            # 视频类PPS权重
    option weight_pps_normal '1'           # 普通类PPS权重
    option weight_pps_bulk '2'             # 大流量类PPS权重
    option weight_burst_bulk '3'           # 大流量类突发权重
    option weight_tcpflags_bulk '2'        # 大流量类TCP标志权重
    option weight_retrans_bulk '2'         # 大流量类重传权重
    option weight_duration_realtime '1'    # 实时类持续时间权重
    option weight_duration_video '1'       # 视频类持续时间权重
    option weight_duration_bulk '2'        # 大流量类持续时间权重
    option weight_ratio_video '1'          # 视频类流量比权重
    option weight_ratio_realtime '1'       # 实时类流量比权重
    option weight_ratio_bulk '1'           # 大流量类流量比权重
    option weight_iat_realtime '2'         # 实时类IAT权重

    # ---------- 评分阈值 ----------
    option score_threshold '3'             # 最低得分阈值（达到此值才分类）

    # ---------- 优先级匹配 ----------
    option prio_realtime '0'               # 实时类期望优先级（值越小优先级越高）
    option prio_video '1'
    option prio_normal '2'
    option prio_bulk '3'
